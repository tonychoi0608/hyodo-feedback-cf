<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <title>효도달력 테스트 피드백 게시판</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #faf7f4;
      color: #3d3531;
      min-height: 100vh;
    }

    .bg-blobs {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: -1; overflow: hidden;
    }
    .bg-blobs .blob1 {
      position: absolute; top: -10%; left: -10%;
      width: 40%; height: 40%; border-radius: 50%;
      background: rgba(232, 114, 90, 0.08); filter: blur(100px);
    }
    .bg-blobs .blob2 {
      position: absolute; bottom: 20%; right: -10%;
      width: 30%; height: 50%; border-radius: 50%;
      background: rgba(251, 146, 60, 0.07); filter: blur(100px);
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 16px 60px;
    }

    .header {
      text-align: center;
      padding: 48px 16px 32px;
    }
    .header-icon {
      display: inline-flex;
      align-items: center; justify-content: center;
      width: 56px; height: 56px;
      background: rgba(232, 114, 90, 0.12);
      color: #e8725a;
      border-radius: 16px;
      margin-bottom: 16px;
      font-size: 28px;
    }
    .header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #2d2420;
      margin-bottom: 8px;
    }
    .header p {
      font-size: 1rem;
      color: #8a7d76;
      line-height: 1.6;
    }

    .form-card {
      background: #fff;
      border-radius: 20px;
      padding: 28px 24px;
      margin-bottom: 36px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      position: relative;
      overflow: hidden;
    }
    .form-card::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 100%; height: 3px;
      background: linear-gradient(90deg, rgba(232,114,90,0.4), rgba(251,146,60,0.4), rgba(232,114,90,0.4));
    }

    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #4d4440;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      border: 1.5px solid #e8e0d8;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.95rem;
      font-family: 'Noto Sans KR', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fdfcfb;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #e8725a;
      box-shadow: 0 0 0 3px rgba(232,114,90,0.1);
    }
    .form-group textarea {
      resize: vertical;
      min-height: 110px;
    }
    .form-group .error {
      color: #dc3545;
      font-size: 0.82rem;
      margin-top: 6px;
    }

    .btn-submit {
      width: 100%;
      background: #e8725a;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(232,114,90,0.25);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-submit:hover { background: #d4603e; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(232,114,90,0.3); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { background: #c9b8ae; cursor: not-allowed; box-shadow: none; transform: none; }

    .section-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px; padding: 0 4px;
    }
    .section-header h2 {
      font-size: 1.15rem; font-weight: 700; color: #2d2420;
    }
    .count-badge {
      background: rgba(232,114,90,0.12);
      color: #e8725a;
      font-size: 0.8rem; font-weight: 600;
      padding: 3px 12px; border-radius: 20px;
    }

    .feedback-list {
      display: flex; flex-direction: column; gap: 14px;
    }

    .feedback-item {
      background: #fff;
      border-radius: 16px;
      padding: 20px 22px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.04);
      display: flex; gap: 14px;
      transition: box-shadow 0.2s;
      animation: fadeInUp 0.4s ease;
    }
    .feedback-item:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(232,114,90,0.15), rgba(251,146,60,0.15));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.9rem; color: #e8725a;
      flex-shrink: 0;
      border: 2px solid rgba(232,114,90,0.1);
    }

    .feedback-body { flex: 1; min-width: 0; }
    .feedback-meta {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px; gap: 8px; flex-wrap: wrap;
    }
    .feedback-name { font-weight: 700; font-size: 0.95rem; color: #2d2420; }
    .feedback-date {
      font-size: 0.78rem; color: #a89a92; white-space: nowrap;
      background: rgba(0,0,0,0.03); padding: 2px 10px; border-radius: 6px;
    }
    .feedback-content {
      font-size: 0.92rem; line-height: 1.7; color: #4d4440;
      white-space: pre-wrap; word-break: break-word;
      background: rgba(0,0,0,0.02); padding: 14px 16px; border-radius: 12px;
    }

    .empty-state {
      text-align: center; padding: 50px 20px;
      background: rgba(255,255,255,0.5); border-radius: 20px;
      border: 2px dashed #e0d6cf;
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
    .empty-state p { color: #a89a92; font-size: 0.92rem; }

    .loading { text-align: center; padding: 40px; color: #a89a92; }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: #2d2420; color: #fff;
      padding: 14px 28px; border-radius: 12px;
      font-size: 0.92rem; z-index: 1000;
      opacity: 0; transition: opacity 0.3s, transform 0.3s;
      pointer-events: none; box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .skeleton {
      background: linear-gradient(90deg, #f0ebe6 25%, #f7f3ef 50%, #f0ebe6 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
  </style>
</head>
<body>

<div class="bg-blobs">
  <div class="blob1"></div>
  <div class="blob2"></div>
</div>

<div class="container">
  <div class="header">
    <div class="header-icon">&#128197;</div>
    <h1>효도달력 테스트 보드</h1>
    <p>앱을 사용해보시고 불편한 점이나 좋은 아이디어를<br>자유롭게 남겨주세요!</p>
  </div>

  <div class="form-card">
    <form id="feedbackForm">
      <div class="form-group">
        <label for="name">테스터 이름 (또는 닉네임)</label>
        <input type="text" id="name" placeholder="홍길동" maxlength="50">
        <div class="error" id="nameError"></div>
      </div>
      <div class="form-group">
        <label for="content">어떤 점이 좋았거나 불편하셨나요?</label>
        <textarea id="content" placeholder="예: 글씨가 더 컸으면 좋겠어요. / 음성 알림 기능이 정말 편하네요!"></textarea>
        <div class="error" id="contentError"></div>
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        의견 남기기
      </button>
    </form>
  </div>

  <div class="section-header">
    <h2>테스터 의견 모음</h2>
    <span class="count-badge" id="feedbackCount">0</span>
  </div>

  <div id="feedbackList" class="feedback-list">
    <div class="loading">
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div class="skeleton" style="height:100px;"></div>
        <div class="skeleton" style="height:100px;"></div>
        <div class="skeleton" style="height:100px;"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const form = document.getElementById('feedbackForm');
  const nameInput = document.getElementById('name');
  const contentInput = document.getElementById('content');
  const nameError = document.getElementById('nameError');
  const contentError = document.getElementById('contentError');
  const submitBtn = document.getElementById('submitBtn');
  const feedbackList = document.getElementById('feedbackList');
  const feedbackCount = document.getElementById('feedbackCount');
  const toastEl = document.getElementById('toast');

  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), 2800);
  }

  function timeAgo(dateStr) {
    const now = new Date();
    const past = new Date(dateStr);
    const diff = Math.floor((now - past) / 1000);
    if (diff < 60) return '방금 전';
    if (diff < 3600) return Math.floor(diff / 60) + '분 전';
    if (diff < 86400) return Math.floor(diff / 3600) + '시간 전';
    if (diff < 2592000) return Math.floor(diff / 86400) + '일 전';
    const y = past.getFullYear();
    const m = String(past.getMonth() + 1).padStart(2, '0');
    const d = String(past.getDate()).padStart(2, '0');
    return y + '.' + m + '.' + d;
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.appendChild(document.createTextNode(text));
    return div.innerHTML;
  }

  function getInitials(name) {
    return escapeHtml(name.substring(0, 2));
  }

  function renderFeedbacks(items) {
    feedbackCount.textContent = items.length;
    if (items.length === 0) {
      feedbackList.innerHTML =
        '<div class="empty-state">' +
          '<div class="icon">&#10084;&#65039;</div>' +
          '<h3>첫 번째 의견을 남겨주세요!</h3>' +
          '<p>아직 등록된 테스트 피드백이 없습니다.<br>여러분의 소중한 첫 의견을 기다립니다.</p>' +
        '</div>';
      return;
    }
    feedbackList.innerHTML = items.map(function(fb, i) {
      return '<div class="feedback-item" style="animation-delay:' + (i * 0.05) + 's">' +
        '<div class="avatar">' + getInitials(fb.name) + '</div>' +
        '<div class="feedback-body">' +
          '<div class="feedback-meta">' +
            '<span class="feedback-name">' + escapeHtml(fb.name) + '</span>' +
            '<span class="feedback-date">' + timeAgo(fb.created_at) + '</span>' +
          '</div>' +
          '<div class="feedback-content">' + escapeHtml(fb.content) + '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  async function loadFeedbacks() {
    try {
      const res = await fetch('/api/feedbacks');
      if (!res.ok) throw new Error('로딩 실패');
      const data = await res.json();
      renderFeedbacks(data);
    } catch (e) {
      feedbackList.innerHTML =
        '<div class="empty-state">' +
          '<h3>의견을 불러오지 못했습니다</h3>' +
          '<p>새로고침해 주세요.</p>' +
        '</div>';
    }
  }

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    nameError.textContent = '';
    contentError.textContent = '';

    const name = nameInput.value.trim();
    const content = contentInput.value.trim();
    let valid = true;

    if (!name) { nameError.textContent = '이름을 입력해주세요.'; valid = false; }
    if (!content) { contentError.textContent = '의견을 입력해주세요.'; valid = false; }
    if (!valid) return;

    submitBtn.disabled = true;
    submitBtn.innerHTML =
      '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>' +
      '등록 중...';

    try {
      const res = await fetch('/api/feedbacks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, content })
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.message || '등록 실패');
      }
      nameInput.value = '';
      contentInput.value = '';
      showToast('의견이 등록되었습니다!');
      await loadFeedbacks();
    } catch (err) {
      showToast('오류: ' + err.message);
    } finally {
      submitBtn.disabled = false;
      submitBtn.innerHTML =
        '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>' +
        '의견 남기기';
    }
  });

  loadFeedbacks();
</script>

<style>
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>

</body>
</html>
